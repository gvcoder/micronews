{% extends 'user/base.html' %}
{% block title %}Reset Password — Micro-News{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5">
    <h2 class="mb-4">Reset Password</h2>

    <form method="POST" action="{{ url_for('user_app.reset_password', token=token) }}">
      <div class="mb-3">
        <label for="password" class="form-label">New Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autocomplete="new-password" required style="min-height:44px;">
        <div class="form-text">Min 8 characters, at least one uppercase, one lowercase, one digit.</div>
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
               autocomplete="new-password" required style="min-height:44px;">
      </div>
      <button type="submit" class="btn btn-primary w-100" style="min-height:44px;">Set New Password</button>
    </form>

    <p class="mt-3 text-center">
      <a href="{{ url_for('user_app.login') }}" style="min-height:44px;display:inline-flex;align-items:center;">
        Back to Login
      </a>
    </p>
  </div>
</div>
{% endblock %}
