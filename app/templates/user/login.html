{% extends 'user/base.html' %}
{% block title %}Login — Micro-News{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5">
    <h2 class="mb-4">Log In</h2>

    <form method="POST" action="{{ url_for('user_app.login') }}">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email"
               autocomplete="email" required style="min-height:44px;">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autocomplete="current-password" required style="min-height:44px;">
      </div>
      <button type="submit" class="btn btn-primary w-100" style="min-height:44px;">Log In</button>
    </form>

    <p class="mt-3 text-center">
      Don't have an account?
      <a href="{{ url_for('user_app.register') }}" style="min-height:44px;display:inline-flex;align-items:center;">Register</a>
    </p>
  </div>
</div>
{% endblock %}
