{% extends 'admin/base.html' %}
{% block title %}Admin Login — Micro-News{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5">
    <h2 class="mb-4">Admin Login</h2>

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_app.login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username"
               autocomplete="username" required style="min-height:44px;">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autocomplete="current-password" required style="min-height:44px;">
      </div>
      <button type="submit" class="btn btn-primary w-100" style="min-height:44px;">Login</button>
    </form>
  </div>
</div>
{% endblock %}
